"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """$directory\
$git_state\
$git_branch\
$git_status\
$jobs\
$status\
$fill\
$cmake\
$container\
$env_var\
$docker_context\
$nodejs\
$kubernetes\
$gcloud\
$terraform
$character"""

[character]
success_symbol = '[п„Ѓ](bold green)'
error_symbol = '[п„Ѓ](bold red)'

[fill]
symbol = ' '

[directory]
truncate_to_repo = true
style = 'bold purple'
format = '[$path]($style)[$read_only]($read_only_style) '

[jobs]
number_threshold = 1
symbol = "у°’І "

[git_branch]
style = 'bold yellow'

[git_status]
format = '([$conflicted$stashed$modified$staged$ahead_behind]($style) ) '
style = 'bold yellow'
up_to_date = '[п…Љ](bold green)'
stashed = 'у°Ђј '
ahead = '[в‡Ў${count}](bold green)'
behind = '[в‡Ј${count}](bold red)'
diverged = '[в‡Ў${ahead_count}](bold green)[в‡Ј${behind_count}](bold red)'

[nodejs]
format = '[](bold purple)[$symbol($version)]($style)[](bold purple) '

[gcloud]
symbol = 'пѓ‚ '
format = '[](bold purple)[$symbol $project]($style)[](bold purple) '

[kubernetes]
disabled = false
format = '[](bold purple)[$symbol$context( \($namespace\))]($style)[](bold purple) '

[[kubernetes.contexts]]
context_pattern = "\\w+_[\\w-]+_(?P<region>[\\w-]+)_(?P<cluster>[\\w-]+)"
context_alias = '$cluster $region'

[terraform]
format = '[$symbol $workspace]($style) '
symbol = 'ољљ'

[env_var]
variable = 'ITERM_PROFILE'
symbol = 'оћ•'
style = 'bold fg:#ff6e6e'
format = '[$symbol $env_value]($style) '

[docker_context]
format = '[](bold purple)[$symbol$context]($style)[](bold purple) '
